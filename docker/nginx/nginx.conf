server {
    listen 80;
    server_name localhost;

    # More specific location blocks (/static/, /ws/) are matched before the
    # catch-all "/" below, regardless of the order they're written in.

    # Static files served directly by nginx
    location /static/ {
        alias /app/static/;
    }

    # WebSocket routes (implemented from Week 4) - proxied with upgrade headers
    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to the Quart app
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
