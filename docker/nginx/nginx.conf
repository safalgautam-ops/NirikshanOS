# Define one virtual server (one website)
server {
    # Accept incoming HTTP connections on port 80 (standard HTTP port)
    listen 80;
    # Handle requests where Host header matches "localhost"
    server_name localhost;

    # nginx's own default is 1MB - forensic evidence uploads (disk/memory
    # images) can run 30-100GB, so this is the outer ceiling the whole
    # platform allows. This config sets the max body size to 100GB,
    # allowing large uploads without nginx rejecting them early.
    client_max_body_size 100G;
    # by default, nginx may receive the whole uploaded file first, save it to a temporary file
    # then send it to the upstream app. This config disables request buffering, so nginx
    # sends the file directly to the app as it arrives, without buffering it first.
    proxy_request_buffering off;
    # Large uploads take a long time on a slow connection - the default
    # 60s read/send timeouts would abort an in-progress transfer well
    # before a 100GB file finishes.
    client_body_timeout 1h;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Static files served directly by nginx
    # Match any URL starting with /static/
    location /static/ {
        # Map /static/ URLs to this folder on disk — nginx serves files directly, never touches Python
        alias /app/static/;
    }

    # any URL starting with /media/ gets forwarded straight to MinIO -- the S3-style storage server
    # specifically points to the nirikshan-public bucket
    # so when a browser  requests an avatar, nginx quietly fetches it from MinIO oand returns it
    # the user never knows MinIO exists; they just see a normal /media/... URL.
    location /media/ {
    # nginx can't read the .env file
        proxy_pass http://minio:9000/nirikshan-public/; # must match MINIO_BUCKET_PUBLIC in the app config, or images won't load
        proxy_set_header Host $host;
    }

    # Everything else goes to the Flask app
    # Match all URLs not caught by the blocks above
    location / {
        # Forward to Flask/Gunicorn on port 8000
        proxy_pass http://web:8000;
        # Pass original domain name so app generates correct URLs
        proxy_set_header Host $host;
        # Pass client's real IP — needed for rate limiting and logging
        proxy_set_header X-Real-IP $remote_addr;
        # Pass full proxy chain — app can find original client IP from first entry
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tell app if original request was HTTP or HTTPS — affects cookie security and redirects
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
