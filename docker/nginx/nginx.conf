# Define one virtual server (one website)
server {
    # Accept incoming HTTP connections on port 80 (standard HTTP port)
    listen 80;
    # Handle requests where Host header matches "localhost"
    server_name localhost;

    # nginx's own default is 1MB - forensic evidence uploads (disk/memory
    # images) can run 30-100GB, so this is the outer ceiling the whole
    # platform allows. Individual features still enforce their own, much
    # smaller limits on top of this in code (see app/core/storage.py) -
    # this directive only stops nginx itself from rejecting a large
    # request before it even reaches the app.
    client_max_body_size 100G;
    # Stream the request body straight to the upstream app instead of
    # buffering the whole thing to a temp file on disk first - essential
    # for multi-gigabyte uploads, otherwise every upload gets written to
    # disk twice (once by nginx, once by the app) and ties up nginx's temp
    # storage for the whole transfer.
    proxy_request_buffering off;
    # Large uploads take a long time on a slow connection - the default
    # 60s read/send timeouts would abort an in-progress transfer well
    # before a 100GB file finishes.
    client_body_timeout 1h;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Static files served directly by nginx
    # Match any URL starting with /static/
    location /static/ {
        # Map /static/ URLs to this folder on disk — nginx serves files directly, never touches Python
        alias /app/static/;
    }

    # WebSocket routes - proxied with upgrade headers
    # Match any URL starting with /ws/ — these are WebSocket connections
    location /ws/ {
        # Forward request to the Quart app running on port 8000 inside Docker
        proxy_pass http://web:8000;
        # Use HTTP/1.1 — required for WebSockets (HTTP/1.0 cannot upgrade)
        proxy_http_version 1.1;
        # Pass the Upgrade header through — tells app client wants WebSocket protocol
        proxy_set_header Upgrade $http_upgrade;
        # Tell the app this connection is changing protocol
        proxy_set_header Connection "upgrade";
        # Pass original domain name so app generates correct URLs
        proxy_set_header Host $host;
        # Pass client's real IP — without this app sees nginx's IP instead
        proxy_set_header X-Real-IP $remote_addr;
        # Pass full chain of IPs if request came through multiple proxies
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tell app whether original request was HTTP or HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to the Quart app
    # Match all URLs not caught by the blocks above
    location / {
        # Forward to Quart/Uvicorn on port 8000
        proxy_pass http://web:8000;
        # Pass original domain name so app generates correct URLs
        proxy_set_header Host $host;
        # Pass client's real IP — needed for rate limiting and logging
        proxy_set_header X-Real-IP $remote_addr;
        # Pass full proxy chain — app can find original client IP from first entry
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tell app if original request was HTTP or HTTPS — affects cookie security and redirects
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
