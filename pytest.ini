[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: pure logic, no Flask app, no DB, no network
    functional: one route via Flask's test client
    integration: multiple layers cooperating against a real test DB
    security: a deliberate attack/negative-case attempt
    e2e: full browser journey via Playwright against a live server
