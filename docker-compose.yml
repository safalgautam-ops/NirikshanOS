services:
  # Public entrypoint - only this service is reachable from the host (port 80).
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    # --reload watches the bind-mounted source for live local development.
    command: uvicorn run:app --host 0.0.0.0 --port 8000 --reload
    # Mirrors the local checkout into the container for live editing.
    volumes:
      - .:/app
    env_file:
      - .env
    # Waits for MySQL/Redis to report healthy, not just "started", before
    # the app's startup hook tries to connect.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Background job processor - separate container so a slow/crashed
  # analyzer never blocks the web app.
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    command: python -m workers.worker_main
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Named volume so case/evidence data survives `docker compose down`.
    volumes:
      - mysql_data:/var/lib/mysql
    # Lets `depends_on: condition: service_healthy` work for web/worker.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
