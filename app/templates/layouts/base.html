<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}NirikshanOS{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favlogo.ico') }}" type="image/x-icon">

    {# Same no-build Tailwind setup used by the CodeSandbox reference. #}
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      {% include "style.css" %}
    </style>

    {# One small shared runtime: theme, CSRF, UI macros, toast and file validation. #}
    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ asset_version('js/app.js') }}"></script>
    {% block scripts %}{% endblock %}

    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    {% block body %}{% endblock %}
    {% block body_scripts %}{% endblock %}
  </body>
</html>
