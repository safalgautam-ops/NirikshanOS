<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activate your account</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9fafb; margin: 0; padding: 40px 16px; }
    .card { background: #ffffff; border-radius: 12px; max-width: 480px; margin: 0 auto; padding: 40px; border: 1px solid #e5e7eb; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.6; margin: 0 0 20px; }
    .otp { font-size: 38px; font-weight: 800; letter-spacing: 10px; color: #111827; background: #f3f4f6; border-radius: 8px; padding: 16px 24px; text-align: center; margin: 28px 0; font-family: monospace; }
    .footer { margin-top: 32px; padding-top: 20px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hi {{ name }},</h1>
    <p>Welcome to NirikshanOS! Use the code below to activate your account. It expires in <strong>10 minutes</strong>.</p>
    <div class="otp">{{ code }}</div>
    <p>Enter this code on the activation page. If you didn't create an account, you can safely ignore this email.</p>
    <div class="footer">NirikshanOS &mdash; Digital Forensics &amp; Incident Response Platform</div>
  </div>
</body>
</html>
