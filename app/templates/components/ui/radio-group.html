{% macro radio_group(name="", class="", attrs={}) -%}<div class="{{ cn('flex flex-col gap-3', class) }}" data-slot="radio-group" role="radiogroup" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% endif %}</div>{%- endmacro %}
{% macro radio(name="", value="", checked=false, disabled=false, class="", attrs={}) -%}<input class="{{ cn('relative inline-flex size-4.5 shrink-0 items-center justify-center rounded-full border border-input bg-background not-dark:bg-clip-padding shadow-xs/5 outline-none transition-shadow focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-1 focus-visible:ring-offset-background disabled:cursor-not-allowed disabled:opacity-64 sm:size-4 accent-primary', class) }}" data-slot="radio" data-state="{{ 'checked' if checked else 'unchecked' }}" type="radio" {% if name %}name="{{ name }}"{% endif %} value="{{ value }}" {% if checked %}checked{% endif %} {% if disabled %}disabled{% endif %} {{ html_attrs(**attrs) }}>{%- endmacro %}
