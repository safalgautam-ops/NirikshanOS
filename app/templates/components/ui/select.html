{#
  Select - native <select> styled to match shadcn (avoids reimplementing
  listbox positioning/accessibility with JS).

  Usage:
    {% from "components/ui/select.html" import select %}
    {{ select("status", [("open","Open"),("closed","Closed")], value="open") }}

  Params:
    name    - field name
    options - list of (value, label) tuples
    value   - currently selected value
#}
{% macro select(name, options, value="", attrs="", extra_classes="") %}
<div class="relative">
  <select id="{{ name }}" name="{{ name }}"
    class="flex h-9 w-full appearance-none rounded-md border border-input bg-transparent px-3 py-1 pr-8 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 {{ extra_classes }}"
    {{ attrs|safe }}>
    {% for opt_value, opt_label in options %}
    <option value="{{ opt_value }}" {% if opt_value == value %}selected{% endif %}>{{ opt_label }}</option>
    {% endfor %}
  </select>
  <svg class="pointer-events-none absolute right-2.5 top-1/2 size-4 -translate-y-1/2 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
</div>
{% endmacro %}
