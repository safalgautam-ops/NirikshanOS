{% macro textarea(name="", value="", placeholder="", rows=4, unstyled=false, bare=false, class="", attrs={}) -%}
<textarea class="{{ class if bare else cn('min-h-24 w-full rounded-lg border border-input bg-background px-3 py-2 text-sm shadow-xs outline-none placeholder:text-muted-foreground focus-visible:ring-2 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50', 'border-0 shadow-none' if unstyled else '', class) }}" data-slot="textarea" rows="{{ rows }}"{% if name %} name="{{ name }}"{% endif %}{% if placeholder %} placeholder="{{ placeholder }}"{% endif %} {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% else %}{{ value }}{% endif %}</textarea>
{%- endmacro %}
