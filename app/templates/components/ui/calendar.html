{% macro calendar(name="", value="", class="", attrs={}) -%}<div class="{{ cn('rounded-xl border bg-card p-3 text-card-foreground shadow-sm', class) }}" data-slot="calendar" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% else %}<input class="h-9 rounded-md border border-input bg-background px-3 text-sm outline-none focus-visible:ring-2 focus-visible:ring-ring" type="date" {% if name %}name="{{ name }}"{% endif %} value="{{ value }}">{% endif %}</div>{%- endmacro %}
