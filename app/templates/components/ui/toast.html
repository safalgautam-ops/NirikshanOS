{% include "components/ui/_runtime.html" %}
{% macro toast(title="", description="", type="", tooltip=false, class="", attrs={}) -%}<div class="{{ cn('relative rounded-lg border bg-popover text-popover-foreground text-sm shadow-lg/5 transition-[scale,opacity]', 'rounded-md text-xs' if tooltip else '', class) }}" data-slot="toast-popup" {% if type %}data-type="{{ type }}"{% endif %} {{ html_attrs(**attrs) }}><div class="pointer-events-auto flex items-center justify-between gap-1.5 overflow-hidden px-3.5 py-3"><div class="flex flex-col gap-0.5"><div class="font-medium" data-slot="toast-title">{{ title }}</div>{% if description %}<div class="text-muted-foreground" data-slot="toast-description">{{ description }}</div>{% endif %}</div>{% if caller is defined %}{{ caller() }}{% endif %}</div></div>{%- endmacro %}
