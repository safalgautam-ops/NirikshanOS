{% macro fieldset(class="", attrs={}) -%}<fieldset class="{{ cn('grid gap-4 rounded-xl border p-4', class) }}" data-slot="fieldset" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% endif %}</fieldset>{%- endmacro %}
{% macro fieldset_legend(text="", class="", attrs={}) -%}<legend class="{{ cn('px-1 text-sm font-medium', class) }}" data-slot="fieldset-legend" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% else %}{{ text }}{% endif %}</legend>{%- endmacro %}
