{#
  Kbd - keyboard shortcut hint.

  Usage:
    {% from "components/ui/kbd.html" import kbd, kbd_group %}
    {{ kbd_group([kbd("Ctrl"), kbd("K")]) }}
#}
{% macro kbd(text, extra_classes="") %}
<kbd class="pointer-events-none inline-flex h-5 min-w-5 select-none items-center justify-center gap-1 rounded-[4px] bg-muted px-1 font-medium text-muted-foreground text-xs {{ extra_classes }}">{{ text }}</kbd>
{% endmacro %}

{% macro kbd_group(items) %}
<kbd class="inline-flex items-center gap-1">{% for item in items %}{{ item }}{% endfor %}</kbd>
{% endmacro %}
