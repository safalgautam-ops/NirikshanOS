{% macro kbd(text="", class="", attrs={}) -%}<kbd class="{{ cn('pointer-events-none inline-flex h-5 select-none items-center gap-1 rounded border bg-muted px-1.5 font-mono text-[10px] font-medium text-muted-foreground opacity-100', class) }}" data-slot="kbd" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% else %}{{ text }}{% endif %}</kbd>{%- endmacro %}
{% macro kbd_group(class="", attrs={}) -%}<span class="{{ cn('inline-flex items-center gap-1', class) }}" data-slot="kbd-group" {{ html_attrs(**attrs) }}>{% if caller is defined %}{{ caller() }}{% endif %}</span>{%- endmacro %}
