{#
  Label - form field label.

  Usage:
    {% from "components/ui/label.html" import label %}
    {{ label("Email", for="email") }}
#}
{% macro label(text, for="", extra_classes="") %}
<label {% if for %}for="{{ for }}"{% endif %} class="inline-flex items-center gap-2 font-medium text-sm text-foreground {{ extra_classes }}">{{ text }}</label>
{% endmacro %}
