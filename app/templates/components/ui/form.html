{% macro form(method="post", action="", id="", class="", unstyled=false, attrs={}) -%}
<form
  {% if id %}id="{{ id }}"{% endif %}
  class="{{ class if unstyled else cn('grid gap-4', class) }}"
  data-slot="form"
  method="{{ method }}"
  {% if action %}action="{{ action }}"{% endif %}
  {{ html_attrs(**attrs) }}
>
  {% if caller is defined %}{{ caller() }}{% endif %}
</form>
{%- endmacro %}
